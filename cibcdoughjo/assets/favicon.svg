<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- CIBC-style faceted diamond mark (concept placeholder — swap for the official CIBC logo) -->
  <defs>
    <linearGradient id="gemHi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E7415A"/>
      <stop offset="1" stop-color="#C8102E"/>
    </linearGradient>
  </defs>
  <!-- gem body -->
  <polygon points="32,4 60,32 32,60 4,32" fill="url(#gemHi)" stroke="#7A0A1C" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- table (top facet) -->
  <polygon points="32,4 46,22 32,32 18,22" fill="#EF6076" opacity=".95"/>
  <!-- upper side facets -->
  <polygon points="4,32 18,22 32,32" fill="#D42540"/>
  <polygon points="60,32 46,22 32,32" fill="#A80E26"/>
  <!-- lower facets -->
  <polygon points="4,32 32,32 32,60" fill="#9A0C24"/>
  <polygon points="60,32 32,32 32,60" fill="#820A1F"/>
  <!-- centre highlight -->
  <polygon points="18,22 32,32 46,22 32,4" fill="none" stroke="#F79AA8" stroke-width="1.1" opacity=".6"/>
</svg>
